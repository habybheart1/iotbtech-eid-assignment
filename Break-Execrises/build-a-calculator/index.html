<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Build A Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="calculator">
        <div>
            <input id="display" readonly>
        <div>
            <button class="clear" id="clear" onclick="clearDisplay()">C</button>
            <button class="backspace" id="backspace" onclick="backspace()">⌫</button>
            <button class="btn" id="divide">÷</button>
            <button class="btn" id="multiply">×</button>
            <button class="btn" id="seven">7</button>
            <button class="btn" id="eight">8</button>
            <button class="btn" id="nine">9</button>
            <button class="btn" id="subtract">-</button>
            <button class="btn" id="four">4</button>
            <button class="btn" id="five">5</button>
            <button class="btn" id="six">6</button>
            <button class="btn" id="add">+</button>
            <button class="btn" id="one">1</button>
            <button class="btn" id="two">2</button>
            <button class="btn" id="three">3</button>
            <button  id="equals" onclick="calculate()">=</button>
            <button class="btn" id="zero">0</button>
            <button class="btn" id="decimal">.</button>
            <button class="btn" id="percent">%</button>
            <button id="power" onclick="displayDigit.value += '^'">^</button>
            <button  id="sqrt"  onclick="displayDigit.value = calculateSqrt(displayDigit.value)">√</button>
            <button  id="factorial" onclick="displayDigit.value = factorial(displayDigit.value)">!</button>
        </div>
        </div>
    </main>
 <script src="main.js"></script>   
</body>
</html>
